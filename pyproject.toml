[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["application/api/tests", "application/lambda/tests", "tests/integration"]
pythonpath = [".", "application/api"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S"]
ignore = ["S101"]

