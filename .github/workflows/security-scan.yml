name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,dockerfile,github_actions
          quiet: true
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            application/api/requirements*.txt
            application/lambda/requirements-dev.txt
      - run: pip install -r application/api/requirements-dev.txt -r application/lambda/requirements-dev.txt pip-audit
      - run: python -m pytest
      - run: pip-audit
